{% extends "layout.html" %}
{% block content %}

<section class="auth-page">
    <div class="auth-box">
        <h1>Become a Partner</h1>
        <p>Join RR CLAN PRO as a service partner.</p>

        <form method="POST">
            <input type="text" name="business_name" placeholder="Business Name" required>
            <input type="text" name="owner_name" placeholder="Owner Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="phone" placeholder="Phone" required>
            <input type="text" name="category" placeholder="Category e.g. Restaurant, AC, Cleaning" required>
            <input type="text" name="service_area" placeholder="Service Area e.g. Koramangala">
            <textarea name="address" placeholder="Business Address"></textarea>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Submit Partner Application</button>
        </form>

        <p>Already applied? <a href="{{ url_for('partner_login') }}">Partner Login</a></p>
    </div>
</section>

{% endblock %}
